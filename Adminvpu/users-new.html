              <h1 class="text-2xl font-bold text-slate-900 mb-6">Edit user</h1>

              <form class="space-y-6">
                <div class="flex flex-col gap-2">
                  <label class="text-sm font-medium text-slate-900">Email<span
                      class="ml-1 text-danger-500">*</span></label>
                  <input value="sarah.wijaya@vpu.co.id" disabled
                    class="w-full rounded-lg border border-slate-300 bg-slate-50 text-slate-400 px-4 py-2.5 text-sm outline-none cursor-not-allowed">

                <div class="flex flex-col gap-2">

                    class="px-6 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium">Cancel</a>

                    class="px-6 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600 font-semibold">Update
